apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend # must match pod template labels below
  template:
    metadata:
      labels:
        app: frontend # must match selector above AND service selector below
    spec:
      containers:
        - name: frontend
          image: ghcr.io/vishesh3011/k8s-wrangler/frontend:cdb8e048e977da68e30cc3c371c05ad417dc5fef@sha256:7512afbd7443c7b6e3ac870158295c5080e23bc9453f285d241f4a2e8e3feead
          ports:
            - containerPort: 80 # nginx listens on 80 inside the container
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: / # nginx serves / — good enough for liveness
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
