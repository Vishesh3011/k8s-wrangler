apiVersion: v1
kind: Service
metadata:
  name: backend-service # this becomes the DNS name inside the cluster
spec:
  selector:
    app: backend # routes to pods with label app: backend
  ports:
    - port: 8080 # port the service exposes
      targetPort: 8080 # port on the pod to forward to
  type: ClusterIP # internal only — not reachable from outside
