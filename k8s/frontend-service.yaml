apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend           # routes to pods labelled app: frontend
  ports:
  - port: 80                # port the service exposes inside cluster
    targetPort: 80          # port on the pod (nginx)
    nodePort: 30080         # port on minikube node — what you hit in browser
  type: NodePort            # NodePort because frontend needs to be browser-accessible